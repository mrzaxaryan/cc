<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>cc</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="cc.styles.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <meta name="theme-color" content="#1e1e2e" />
    <script>
        (function() {
            var t = localStorage.getItem('cc-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            if (t === 'light') document.querySelector('meta[name="theme-color"]').content = '#eff1f5';
        })();
    </script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="cc-loading">
            <span class="cc-loading-brand">cc</span>
            <div class="cc-loading-spinner"></div>
            <div class="cc-loading-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/interop.js"></script>
    <script src="js/filesystem.js"></script>
    <script src="js/indexeddb.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js').then(reg => {
            reg.addEventListener('updatefound', () => {
                const w = reg.installing;
                w.addEventListener('statechange', () => {
                    if (w.state === 'installed' && navigator.serviceWorker.controller)
                        window._ccUpdateAvailable = true;
                });
            });
        }).catch(e => console.warn('SW registration failed:', e));
    </script>
</body>

</html>
